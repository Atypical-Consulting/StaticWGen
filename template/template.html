<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <meta content="light dark" name="color-scheme">
  <link
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
      rel="stylesheet"
  >
  <link rel="stylesheet" href="css/prism.css">
  <title>{{ page_title }} - {{ site_title }}</title>
  <meta name="description" content="{{ description }}">
  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="{{ page_title }} - {{ site_title }}">
  <meta property="og:description" content="{{ description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page_url }}">
  <meta property="og:image" content="{{ image_url }}">
  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page_title }} - {{ site_title }}">
  <meta name="twitter:description" content="{{ description }}">
  <meta name="twitter:image" content="{{ image_url }}">
  <!-- Other meta tags -->
  <meta name="keywords" content="{{ keywords }}">
  <meta name="author" content="{{ author }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Atom Feed Discovery -->
  <link rel="alternate" type="application/atom+xml" title="{{ site_title }} Feed" href="/feed.xml">
</head>
<body>
  <!-- Header -->
  <header class="container">
    <nav>
      <ul>
        <li><strong><a href="/">{{ site_title }}</a></strong></li>
      </ul>
      <ul>
        {{ for item in menu }}
        <li><a href="/{{ item.url }}">{{ item.title }}</a></li>
        {{ end }}
        <li><a href="/tags.html">Tags</a></li>
        <li>
          <details class="dropdown">
            <summary role="button" class="secondary">Theme</summary>
            <ul>
              <li><a href="#" data-theme-switcher="auto">Auto</a></li>
              <li><a href="#" data-theme-switcher="light">Light</a></li>
              <li><a href="#" data-theme-switcher="dark">Dark</a></li>
            </ul>
          </details>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Main -->
  <main class="container">
    {{ content }}
    {{ if tags && tags.size > 0 }}
    <nav aria-label="Tags">
      <p><strong>Tags:</strong>
        {{ for tag in tags }}
        <a href="{{ tag.url }}" style="display: inline-block; padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.85rem; text-decoration: none; margin-right: 0.25rem;">{{ tag.name }}</a>
        {{ end }}
      </p>
    </nav>
    {{ end }}
  </main>

  <!-- Footer -->
  <footer class="container">
    <small>© 2024 {{ site_title }}</small>
  </footer>

  <!-- Minimal theme switcher -->
  <script src="js/minimal-theme-switcher.js"></script>

  <!-- Modal -->
  <script src="js/modal.js"></script>
  
  <!-- Prism.js -->
  <script src="js/prism.js"></script>

  <!-- Include Mermaid.js -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

  <!-- Initialize Mermaid -->
  <script>
    mermaid.initialize({ startOnLoad: true });
  </script>
</body>
</html>
